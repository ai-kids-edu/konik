}

function initMinimap() {
  minimapCanvas = document.getElementById('minimap');
  minimapCtx = minimapCanvas.getContext('2d');
}

function drawMinimap() {
  const ctx = minimapCtx;
  if (!ctx) return;
  const W = 160, H = 160;
  const R = W / 2;
  const MAP_RANGE = 100;

  function toMap(wx, wz) {
    return {
      x: (wx / MAP_RANGE * 0.5 + 0.5) * W,
      y: (wz / MAP_RANGE * 0.5 + 0.5) * H,
    };
  }

  ctx.clearRect(0, 0, W, H);

  // Clip to circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(R, R, R - 2, 0, Math.PI * 2);
  ctx.clip();

  // Grass background with subtle gradient
  const grassGrad = ctx.createRadialGradient(R, R, 0, R, R, R);
  grassGrad.addColorStop(0, '#4a9a38');
  grassGrad.addColorStop(1, '#357028');
  ctx.fillStyle = grassGrad;
  ctx.fillRect(0, 0, W, H);

  // Farm area (soft brown circle)
  const fp = toMap(FARM_X, FARM_Z);
  const fr = (FARM_RADIUS / MAP_RANGE) * W * 0.5;
  const farmGrad = ctx.createRadialGradient(fp.x, fp.y, 0, fp.x, fp.y, fr);
  farmGrad.addColorStop(0, '#8a7a55');
  farmGrad.addColorStop(1, '#6a5a3a');
  ctx.fillStyle = farmGrad;
  ctx.beginPath();
  ctx.arc(fp.x, fp.y, fr, 0, Math.PI * 2);
  ctx.fill();

  // Beach and water (curved)
  for (let px = 0; px < W; px++) {
    const wx = ((px / W) - 0.5) * MAP_RANGE * 2;
    const bsz = beachStartZ(wx);
    const wsz = waterStartZ(wx);
    const beachPx = toMap(0, bsz).y;
    const waterPx = toMap(0, wsz).y;
    ctx.fillStyle = '#e8c840';
    ctx.fillRect(px, beachPx, 1, waterPx - beachPx);
    ctx.fillStyle = '#3098d0';
    ctx.fillRect(px, waterPx, 1, H - waterPx);
  }

  // Trees (soft green dots)
  for (const t of treePositions) {
    const p = toMap(t.x, t.z);
    ctx.fillStyle = 'rgba(30, 90, 20, 0.7)';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Challenges (glowing golden stars)
  for (const ch of challenges) {
    if (!ch.active) continue;
    const p = toMap(ch.position.x, ch.position.z);
    // Glow
    ctx.fillStyle = 'rgba(255, 220, 50, 0.3)';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
    ctx.fill();
    // Star
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    for (let s = 0; s < 5; s++) {
      const a = (s / 5) * Math.PI * 2 - Math.PI / 2;
      const r1 = 4, r2 = 2;
      ctx.lineTo(p.x + Math.cos(a) * r1, p.y + Math.sin(a) * r1);
      const a2 = a + Math.PI / 5;
      ctx.lineTo(p.x + Math.cos(a2) * r2, p.y + Math.sin(a2) * r2);
    }
    ctx.closePath();
    ctx.fill();
  }

  // Horse — glowing arrow
  const hp = toMap(horsePos.x, horsePos.z);
  const dirX = Math.sin(horseAngle);
  const dirY = Math.cos(horseAngle);
  const perpX = -dirY;
  const perpY = dirX;

  // Glow behind horse
  ctx.fillStyle = 'rgba(255, 80, 80, 0.25)';
  ctx.beginPath();
  ctx.arc(hp.x, hp.y, 10, 0, Math.PI * 2);
  ctx.fill();

  // Arrow
  ctx.save();
  ctx.translate(hp.x, hp.y);
  ctx.fillStyle = '#ff3333';
  ctx.beginPath();
  ctx.moveTo(dirX * 8, dirY * 8);
  ctx.lineTo(perpX * 4 - dirX * 4, perpY * 4 - dirY * 4);
  ctx.lineTo(-dirX * 2, -dirY * 2);
  ctx.lineTo(-perpX * 4 - dirX * 4, -perpY * 4 - dirY * 4);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Center dot
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(0, 0, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // End clip
  ctx.restore();

  // Circular border (drawn outside clip)
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(R, R, R - 1, 0, Math.PI * 2);
  ctx.stroke();

  // Compass N indicator
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('N', R, 12);
}

// ========== ANIMATION ==========
let lastHorseMoving = false;
let lastHorseGait = 'idle'; // 'idle' | 'walk' | 'gallop'

function switchHorseAnim(name) {
  if (!horseMixer || !horseActions[name]) return;
  if (lastHorseGait === name) return;
  lastHorseGait = name;
  const target = horseActions[name];
  const allActions = Object.values(horseActions);
  allActions.forEach(a => { if (a !== target) a.fadeOut(0.4); });
  target.reset().fadeIn(0.4).play();
}

function animateHorse(dt, moving) {
  if (!horseMixer) return;
  horseMixer.update(dt);

  // Determine gait: idle → walk → gallop
  const speed = Math.abs(horseSpeed);
  let targetGait;
  if (!moving || speed < 0.1) {
    targetGait = 'idle';
  } else if (speed > BASE_SPEED + 2) {
    targetGait = 'gallop';
  } else {
    targetGait = 'walk';
  }

  // Don't override eating animation
  if (!isEatingCarrots) {
    switchHorseAnim(targetGait);
  }

  // Slow down gallop animation so it looks natural, not frantic
  if (targetGait === 'gallop') {
    horseMixer.timeScale = 0.65;
  } else {
    horseMixer.timeScale = 1.0;
  }
}

// ========== SPACE ACTION (mount/dismount farmer) ==========
function handleSpaceAction() {
  if (ridingFarmer) {
    // Dismount — put farmer back in world
    const farmer = ridingFarmer;
    ridingFarmer = null;
    // Place farmer next to horse
    const dropX = horsePos.x - Math.sin(horseAngle) * 2 + Math.cos(horseAngle) * 2;
    const dropZ = horsePos.z - Math.cos(horseAngle) * 2 - Math.sin(horseAngle) * 2;
    const dropH = getTerrainHeight(dropX, dropZ);
    // Remove from horse group, add back to scene
    horseGroup.remove(farmer.group);
    farmer.group.position.set(dropX, dropH, dropZ);
    farmer.group.rotation.y = angleToRotationY(horseAngle);
    farmer.group.scale.set(1.4, 1.4, 1.4);
    scene.add(farmer.group);
    farmer.mounted = false;
    return;
  }

  // Try to mount — find closest farmer within range
  let closest = null, closestDist = 6;
  for (const farmer of farmers) {
    if (farmer.mounted) continue;
    const fdx = horsePos.x - farmer.group.position.x;
    const fdz = horsePos.z - farmer.group.position.z;
    const dist = Math.sqrt(fdx * fdx + fdz * fdz);
    if (dist < closestDist) {
      closest = farmer;
      closestDist = dist;
    }
  }
  if (closest) {
    // Mount farmer on horse
    ridingFarmer = closest;
    closest.mounted = true;
    // Remove from scene, add to horse group
    scene.remove(closest.group);
    closest.group.position.set(0, 1.8, 0); // sitting on horse's back
    closest.group.rotation.set(0, 0, 0);
    closest.group.scale.set(1, 1, 1); // relative to horse scale
    horseGroup.add(closest.group);
  }
}

// ========== GAME LOOP ==========
function update() {
  const dt = Math.min(clock.getDelta(), 0.05);
  const input = getInput();

  // Rotate horse (tank-style turning) — slower for easier aiming
  const turnSpeed = 2.0;
  horseAngle += input.turn * turnSpeed * dt;

  // Move horse forward/backward — accelerate over time for gallop
  if (Math.abs(input.forward) > 0.1) {
    runTimer += dt;
    // After 1.5s of running, gradually increase max speed up to MAX_SPEED
    const gallopT = THREE.MathUtils.clamp((runTimer - 1.5) / 3.0, 0, 1);
    currentMaxSpeed = THREE.MathUtils.lerp(BASE_SPEED, MAX_SPEED, gallopT);
    horseSpeed = THREE.MathUtils.lerp(horseSpeed, currentMaxSpeed * input.forward, dt * 5);
  } else {
    runTimer = 0;
    currentMaxSpeed = BASE_SPEED;
    horseSpeed = THREE.MathUtils.lerp(horseSpeed, 0, dt * 8);
  }

  if (Math.abs(horseSpeed) > 0.01) {
    const nextX = horsePos.x + Math.sin(horseAngle) * horseSpeed * dt;
    const nextZ = horsePos.z + Math.cos(horseAngle) * horseSpeed * dt;

    // Prevent going too deep into water
    if (nextZ < WATER_DEEP_Z) {
      // Check barn wall collisions
      let blocked = false;
      const horseR = 0.8; // horse collision radius
      for (const c of barnColliders) {
        if (nextX + horseR > c.minX && nextX - horseR < c.maxX &&
            nextZ + horseR > c.minZ && nextZ - horseR < c.maxZ) {
          blocked = true;
          break;
        }
      }
      // Check tree collisions
      if (!blocked) {
        for (const t of treePositions) {
          const tdx = nextX - t.x, tdz = nextZ - t.z;
          if (Math.sqrt(tdx * tdx + tdz * tdz) < 1.0) {
            blocked = true;
            break;
          }
        }
      }
      if (!blocked) {
        horsePos.x = nextX;
        horsePos.z = nextZ;
      } else {
        // Try sliding along the wall instead of full stop
        // Test X-only movement
        let xBlocked = false;
        for (const c of barnColliders) {
          if (nextX + horseR > c.minX && nextX - horseR < c.maxX &&
              horsePos.z + horseR > c.minZ && horsePos.z - horseR < c.maxZ) {
            xBlocked = true; break;
          }
        }
        let zBlocked = false;
        for (const c of barnColliders) {
          if (horsePos.x + horseR > c.minX && horsePos.x - horseR < c.maxX &&
              nextZ + horseR > c.minZ && nextZ - horseR < c.maxZ) {
            zBlocked = true; break;
          }
        }
        if (!xBlocked) horsePos.x = nextX;
        else if (!zBlocked) horsePos.z = nextZ;
        else horseSpeed *= 0.1;
      }
    } else {
      horseSpeed = 0;
    }

    // Keep within world bounds
    horsePos.x = THREE.MathUtils.clamp(horsePos.x, -95, 95);
    horsePos.z = THREE.MathUtils.clamp(horsePos.z, -95, WATER_DEEP_Z - 1);
  }

  // Slow down in water
  const waterDepth = getWaterDepth(horsePos.x, horsePos.z);
  if (waterDepth > 0) {
    const slowFactor = Math.max(0.3, 1.0 - waterDepth * 1.5);
    horseSpeed *= slowFactor;
  }

  // Set horse height to follow terrain
  const terrainY = getTerrainHeight(horsePos.x, horsePos.z);
  horsePos.y = Math.max(terrainY, WATER_LEVEL);

  // Update horse transform — force position from terrain, not from animation
  horseGroup.position.copy(horsePos);
  horseGroup.rotation.y = horseAngle;
  // Clamp the inner model to prevent animation root motion bouncing
  if (horse) {
    horse.position.x = 0;
    horse.position.z = 0;
    horse.position.y = 0;
  }

  // Animate horse
  animateHorse(dt, input.moving);

  // Camera follow
  // Camera — during eating, swing to the side so carrots are visible
  let camTarget;
  if (isEatingCarrots) {
    // Cinematic close-up from the side — like a cutscene
    const perpX = Math.cos(horseAngle);
    const perpZ = -Math.sin(horseAngle);
    camTarget = new THREE.Vector3(
      horsePos.x + perpX * 3 + Math.sin(horseAngle) * 0.5,
      horsePos.y + 1.5,
      horsePos.z + perpZ * 3 + Math.cos(horseAngle) * 0.5
    );
  } else {
    camTarget = new THREE.Vector3(
      horsePos.x - Math.sin(horseAngle) * 6,
      horsePos.y + 4.5,
      horsePos.z - Math.cos(horseAngle) * 6
    );
  }
  camera.position.lerp(camTarget, dt * 3);
  camera.lookAt(
    horsePos.x + Math.sin(horseAngle) * (isEatingCarrots ? 1 : 2),
    horsePos.y + (isEatingCarrots ? 0.5 : 1.0),
    horsePos.z + Math.cos(horseAngle) * (isEatingCarrots ? 1 : 2)
  );

  // Challenge management
  challengeCooldown -= dt;
  if (challenges.filter(c => c.active).length < 3 && challengeCooldown <= 0) {
    createChallenge();
    challengeCooldown = 2;
  }

  // Check proximity to challenges
  const questionBar = document.getElementById('question-bar');
  let nearChallenge = null;

  for (const ch of challenges) {
    if (!ch.active) continue;
    // Use 2D distance (ignore height differences from hills)
    const dx = horsePos.x - ch.position.x, dz = horsePos.z - ch.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);

    // Show question when close
    if (dist < 12) {
      nearChallenge = ch;
      ch.revealed = true;

      // Check collision with buckets (2D distance)
      for (const pile of ch.hayPiles) {
        const pdx = horsePos.x - (ch.position.x + pile.localX);
        const pdz = horsePos.z - ch.position.z;
        const pileDist = Math.sqrt(pdx * pdx + pdz * pdz);

        if (pileDist < 1.5) {
          handleAnswer(ch, pile);
        }
      }
    }

    // Animate glow orbs (gentle bob)
    // Orbs are the last children added to group
  }

  if (!nearChallenge) {
    questionBar.style.display = 'none';
    // Reset revealed state so question shows again on re-approach
    for (const ch of challenges) {
      if (ch.revealed && ch.active) {
        const rdx = horsePos.x - ch.position.x, rdz = horsePos.z - ch.position.z;
        if (Math.sqrt(rdx * rdx + rdz * rdz) >= 12) ch.revealed = false;
      }
    }
  }

  // Update all animation mixers (farm animals, birds, etc.)
  for (const mixer of animationMixers) {
    mixer.update(dt);
  }

  // Animate water, clouds, and birds
  animateWater(clock.elapsedTime);
  animateClouds(dt);
  animateBirds(dt);

  // Remove far-away challenges (2D distance)
  for (let i = challenges.length - 1; i >= 0; i--) {
    const ch = challenges[i];
    if (!ch.active) continue;
    const fdx = horsePos.x - ch.position.x, fdz = horsePos.z - ch.position.z;
    const dist = Math.sqrt(fdx * fdx + fdz * fdz);
    if (dist > 80) {
      scene.remove(ch.group);
      challenges.splice(i, 1);
    }
  }

  // Eat apples near horse
  for (const apple of apples) {
    if (apple.eaten) continue;
    const adx = horsePos.x - apple.x, adz = horsePos.z - apple.z;
    const aDist = Math.sqrt(adx * adx + adz * adz);
    if (aDist < 2.0) {
      apple.eaten = true;
      // Apple falls and disappears
      const startY = apple.mesh.position.y;
      const startTime = Date.now();
      function animApple() {
        const t = (Date.now() - startTime) / 500;
        if (t < 1) {
          apple.mesh.position.y = startY - t * 2;
          apple.mesh.scale.setScalar(1 - t);
          requestAnimationFrame(animApple);
        } else {
          scene.remove(apple.mesh);
        }
      }
      animApple();
      applesCollected++;
      updateCarrotHUD();
      spawnConfetti({ x: apple.x, y: apple.y, z: apple.z });
      // Brief eating animation
      playHorseAnimation('eating', 1200);
      isEatingCarrots = true;
      setTimeout(() => { isEatingCarrots = false; }, 1200);
    }
  }

  // Push hay bales
  for (const bale of hayBales) {
    const bdx = bale.x - horsePos.x;
    const bdz = bale.z - horsePos.z;
    const bDist = Math.sqrt(bdx * bdx + bdz * bdz);
    if (bDist < 1.5 && Math.abs(horseSpeed) > 0.5) {
      // Push bale away from horse
      const pushForce = horseSpeed * dt * 2;
      const pushAngle = Math.atan2(bdx, bdz);
      bale.x += Math.sin(pushAngle) * pushForce;
      bale.z += Math.cos(pushAngle) * pushForce;
      // Keep in farm
      const fdx = bale.x - FARM_X, fdz = bale.z - FARM_Z;
      if (Math.sqrt(fdx * fdx + fdz * fdz) > FARM_RADIUS - 1) {
        bale.x -= Math.sin(pushAngle) * pushForce;
        bale.z -= Math.cos(pushAngle) * pushForce;
      }
      bale.mesh.position.x = bale.x;
      bale.mesh.position.z = bale.z;
      bale.mesh.position.y = getTerrainHeight(bale.x, bale.z) + 0.6;
      // Rotate bale as it rolls
      bale.mesh.children[0].rotation.x += pushForce * 0.5;
    }
  }

  // Animate farm animals (wander + flee from horse)
  animateFarmAnimals(dt);

  // Check if horse is near water trough — drinking animation
  const troughDx = horsePos.x - (FARM_X - 5);
  const troughDz = horsePos.z - (FARM_Z + 2);
  const troughDist = Math.sqrt(troughDx * troughDx + troughDz * troughDz);
  if (troughDist < 2.5 && Math.abs(horseSpeed) < 0.5) {
    if (!isDrinking) {
      isDrinking = true;
      drinkTimer = 0;
    }
    drinkTimer += dt;
    // Bend horse model down to drink
    if (horse) {
      const bendDown = Math.min(drinkTimer * 2, 1);
      horse.rotation.x = -0.25 * bendDown + Math.sin(drinkTimer * 2.5) * 0.03;
    }
  } else {
    if (isDrinking) {
      isDrinking = false;
      if (horse) horse.rotation.x = 0;
    }
  }

  // Draw minimap
  drawMinimap();

  renderer.render(scene, camera);
  requestAnimationFrame(update);
}

function animateBucketTip(pile, isCorrect, challenge) {
  if (pile.revealed) return;
  pile.revealed = true;
  const pivot = pile.bucketPivot;
  const lid = pile.lidGroup;
  const hayGroup = pivot.parent; // hayGroup is parent of bucketPivot

  // Detach lid from rotating pivot → attach to stable hayGroup
  const lidWorldPos = new THREE.Vector3();
  lid.getWorldPosition(lidWorldPos);
  pivot.remove(lid);
  hayGroup.add(lid);
  // Set lid position in hayGroup local space
  lid.position.set(0, 1.0, 0);
  lid.rotation.set(0, 0, 0);

  const startTime = Date.now();

  function animate() {
    const elapsed = (Date.now() - startTime) / 1000;

    // Step 1: Lid pops up and lands to the side
    const lidT = Math.min(elapsed / 0.6, 1);
    lid.position.x = lidT * 1.5;
    lid.position.y = 1.0 + Math.sin(lidT * Math.PI) * 0.6 - lidT * 0.96;
    if (lid.position.y < 0.04) lid.position.y = 0.04;
    lid.rotation.z = lidT * 0.2;

    // Step 2 (0.1-0.5s): Bucket tips FORWARD (opening toward horse = +Z)
    if (elapsed > 0.1 && elapsed < 0.8) {
      const tipT = Math.min((elapsed - 0.1) / 0.4, 1);
      const eased = 1 - Math.pow(1 - tipT, 2);
      pivot.rotation.x = eased * (Math.PI * 0.45); // tip forward
      pivot.position.z = eased * 0.3; // shift forward slightly
      pivot.position.y = eased * 0.1;
    }

    // Step 3 (0.5-1.0s): Bucket keeps falling and rolls to the side
    if (elapsed > 0.5) {
      const rollT = Math.min((elapsed - 0.5) / 0.5, 1);
      const rollEase = 1 - Math.pow(1 - rollT, 2);
      pivot.rotation.x = Math.PI * 0.45 + rollEase * 0.15; // tip a bit more
      pivot.rotation.z = rollEase * (Math.PI * 0.3); // roll sideways
      pivot.position.x = -rollEase * 0.8; // slide to side
      pivot.position.z = 0.3 + rollEase * 0.3;
    }

    // Step 4: Carrots visible once bucket opening faces horse
    if (isCorrect && elapsed > 0.35) {
      pile.carrotsGroup.visible = true;
    }

    if (elapsed < 1.3) {
      requestAnimationFrame(animate);
    }
  }
  animate();
}

function playHorseAnimation(name, duration) {
  if (!horseMixer || !horseActions[name]) return;
  const action = horseActions[name];
  const allActions = Object.values(horseActions);
  allActions.forEach(a => { if (a !== action) a.fadeOut(0.3); });
  action.reset().fadeIn(0.3).setLoop(THREE.LoopOnce, 1).clampWhenFinished = true;
  action.play();
  // Return to idle after duration
  if (duration) {
    setTimeout(() => {
      const idleAction = horseActions['idle'] || horseActions['idle_2'] || allActions[0];
      if (idleAction) {
        allActions.forEach(a => { if (a !== idleAction) a.fadeOut(0.3); });
        idleAction.reset().fadeIn(0.3).play();
      }
      lastHorseMoving = false;
    }, duration);
  }
}

function handleAnswer(challenge, pile) {
  if (!challenge.active) return;
  if (pile.revealed) return;

  const questionBar = document.getElementById('question-bar');

  // Animate bucket tipping over
  animateBucketTip(pile, pile.correct, challenge);

  if (pile.correct) {
    challenge.active = false;
    carrots++;
    correctAnswers++;
    totalAnswers++;
    updateCarrotHUD();

    // Light confetti — gentle, colorful
    // Confetti from the correct bucket position
    spawnConfetti({
      x: challenge.position.x + pile.localX,
      y: challenge.position.y + 1.5,
      z: challenge.position.z,
    });
    updateDifficulty();

    // Carrots spill in front of the chosen bucket (+Z in hayGroup space)
    // = challenge.position + pile.localX on X, challenge.position.z + ~1.5 on Z
    const carrotAreaX = challenge.position.x + pile.localX;
    const carrotAreaZ = challenge.position.z + 1.5; // where carrots land

    // Position horse 2m behind the carrot area, facing them
    const dx = carrotAreaX - horsePos.x;
    const dz = carrotAreaZ - horsePos.z;
    const dist = Math.sqrt(dx * dx + dz * dz) || 1;
    horsePos.x = carrotAreaX - (dx / dist) * 2.0;
    horsePos.z = carrotAreaZ - (dz / dist) * 2.0;
    horsePos.y = getTerrainHeight(horsePos.x, horsePos.z);
    // Face the carrots
    const dx2 = carrotAreaX - horsePos.x;
    const dz2 = carrotAreaZ - horsePos.z;
    horseAngle = Math.atan2(dx2, dz2);
    horseGroup.position.copy(horsePos);
    horseGroup.rotation.y = horseAngle;
    horseSpeed = 0;

    isEatingCarrots = true;
    playHorseAnimation('eating', 2500);

    // Also hide carrots from bucket one by one
    const carrotMeshes = pile.carrotsGroup.visible ? pile.carrotsGroup.children.slice() : [];
    let eatIdx = 0;
    const eatInterval = setInterval(() => {
      if (eatIdx < carrotMeshes.length) {
        carrotMeshes[eatIdx].visible = false;
        eatIdx++;
      } else {
        clearInterval(eatInterval);
      }
    }, 300);

    setTimeout(() => {
      isEatingCarrots = false;
    }, 2500);

    // Fade out challenge gate after eating
    setTimeout(() => {
      const fadeStart = Date.now();
      function fadeGate() {
        const t = (Date.now() - fadeStart) / 2000; // 2s fade
        if (t >= 1) {
          scene.remove(challenge.group);
          const idx = challenges.indexOf(challenge);
          if (idx >= 0) challenges.splice(idx, 1);
          return;
        }
        challenge.group.traverse((child) => {
          if (child.isMesh && child.material) {
            child.material.transparent = true;
            child.material.opacity = 1 - t;
          }
        });
        requestAnimationFrame(fadeGate);
      }
      fadeGate();
    }, 4000); // start fading 4s after answer
  } else {
    // Wrong — clear push back away from bucket
    totalAnswers++;
    horseSpeed = -3;
    horsePos.x -= Math.sin(horseAngle) * 3.5;
    horsePos.z -= Math.cos(horseAngle) * 3.5;
    updateDifficulty();
  }

  questionBar.style.display = 'none';
}

// Level structure:
// Lvl 1: addition 1-5 (dots only)
// Lvl 2: addition 1-7 (dots + some numbers)
// Lvl 3: addition + subtraction 1-7
// Lvl 4: addition + subtraction 1-9
// Lvl 5: addition + subtraction 1-10 (numbers)
// Lvl 6: 1-12
// Lvl 7: 1-15
const LEVELS = [
  { maxNum: 5, name: 'Poziom 1' },
  { maxNum: 7, name: 'Poziom 2' },
  { maxNum: 7, name: 'Poziom 3' },   // same range but subtraction unlocks at 7
  { maxNum: 9, name: 'Poziom 4' },
  { maxNum: 10, name: 'Poziom 5' },
  { maxNum: 12, name: 'Poziom 6' },
  { maxNum: 15, name: 'Poziom 7' },
];

function updateDifficulty() {
  const rate = totalAnswers > 0 ? correctAnswers / totalAnswers : 0;

  // Fast advancement early, slower later
  const needed = level <= 3 ? 2 : 3;
  if (correctAnswers >= needed && rate >= 0.65 && level < LEVELS.length) {
    level = Math.min(level + 1, LEVELS.length);
    maxNumber = LEVELS[Math.min(level - 1, LEVELS.length - 1)].maxNum;
    const lvlName = LEVELS[Math.min(level - 1, LEVELS.length - 1)].name;
    document.getElementById('level-display').textContent = lvlName;
    correctAnswers = 0;
    totalAnswers = 0;
    // TODO: celebration for level up
  } else if (totalAnswers >= 5 && rate < 0.35 && level > 1) {
    level = Math.max(1, level - 1);
    maxNumber = LEVELS[level - 1].maxNum;
    document.getElementById('level-display').textContent = LEVELS[level - 1].name;
    correctAnswers = 0;
    totalAnswers = 0;
  }
}

// ========== CONFETTI (gentle, colorful) ==========
function spawnConfetti(pos) {
  const count = 25;
  const confettiPieces = [];
  // Soft pastel colors for kids
  const confettiColors = [0xff8888, 0x88ff88, 0x8888ff, 0xffff66, 0xff88ff, 0x88ffff, 0xffbb44];

  for (let i = 0; i < count; i++) {
    const geo = new THREE.PlaneGeometry(0.12, 0.08);
    const color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
    const mat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: 1 });
    const piece = new THREE.Mesh(geo, mat);
    piece.position.set(
      pos.x + (Math.random() - 0.5) * 2,
      pos.y + 2 + Math.random() * 1,
      pos.z + (Math.random() - 0.5) * 2
    );
    piece.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    scene.add(piece);
    confettiPieces.push({
      mesh: piece,
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * 3 + 1,
      vz: (Math.random() - 0.5) * 3,
      rotSpeed: (Math.random() - 0.5) * 8,
    });
  }

  let time = 0;
  function animateConfetti() {
    time += 0.016;
    if (time > 2.5) {
      for (const p of confettiPieces) {
        scene.remove(p.mesh);
        p.mesh.geometry.dispose();
        p.mesh.material.dispose();
      }
      return;
    }

    for (const p of confettiPieces) {
      p.mesh.position.x += p.vx * 0.016;
      p.mesh.position.y += p.vy * 0.016;
      p.mesh.position.z += p.vz * 0.016;
      p.vy -= 2.5 * 0.016; // gentle gravity (slower than real)
      p.mesh.rotation.x += p.rotSpeed * 0.016;
      p.mesh.rotation.z += p.rotSpeed * 0.5 * 0.016;
      // Fade out in last second
      if (time > 1.5) {
        p.mesh.material.opacity = 1 - (time - 1.5) / 1.0;
      }
    }
    requestAnimationFrame(animateConfetti);
  }
  animateConfetti();
}

// ========== STATE PERSISTENCE (hot reload) ==========
function saveState() {
  // Serialize active challenges
  const savedChallenges = challenges.filter(c => c.active).map(ch => ({
    x: ch.position.x, z: ch.position.z,
    question: ch.question, answer: ch.answer,
    answers: ch.hayPiles.map(p => ({ answer: p.answer, correct: p.correct, revealed: p.revealed })),
  }));

  const state = {
    horseX: horsePos.x, horseY: horsePos.y, horseZ: horsePos.z,
    horseAngle, horseSpeed, carrots, applesCollected, level, maxNumber,
    correctAnswers, totalAnswers, runTimer, walkTime,
    challenges: savedChallenges,
    gameStarted: true,
  };
  sessionStorage.setItem('horseGameState', JSON.stringify(state));
}

function loadState() {
  try {
    const raw = sessionStorage.getItem('horseGameState');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

// Recreate a challenge at a specific position with known answers
function createChallengeAt(cx, cz, question, answerVal, answersData) {
  const answers = answersData.map(a => a.answer);
  const group = new THREE.Group();
  const challengeY = getTerrainHeight(cx, cz);
  group.position.set(cx, challengeY, cz);

  // Gate pillars
  const pillarGeo = new THREE.CylinderGeometry(0.15, 0.15, 4, 8);
  const pillarMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0xFFD700, emissiveIntensity: 0.3 });
  const pillarLeft = new THREE.Mesh(pillarGeo, pillarMat);
  pillarLeft.position.set(-6, 2, 0);
  group.add(pillarLeft);
  const pillarRight = new THREE.Mesh(pillarGeo, pillarMat);
  pillarRight.position.set(6, 2, 0);
  group.add(pillarRight);
  const bar = new THREE.Mesh(new THREE.BoxGeometry(12.5, 0.2, 0.2), pillarMat);
  bar.position.set(0, 4, 0);
  group.add(bar);
  const beacon = new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0xFFFF00, emissive: 0xFFFF00, emissiveIntensity: 0.8, transparent: true, opacity: 0.7 })
  );
  beacon.position.set(0, 5, 0);
  group.add(beacon);

  // Buckets (same code as createChallenge)
  const hayPiles = [];
  for (let i = 0; i < 3; i++) {
    const hx = (i - 1) * 3.5;
    const hayGroup = new THREE.Group();
    hayGroup.position.set(hx, 0, 0);
    const bucketPivot = new THREE.Group();
    const bucketColor = [0x7799bb, 0x99774b, 0x77aa77][i];
    const bucketMat = new THREE.MeshLambertMaterial({ color: bucketColor });
    const bucket = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.5, 1.0, 12, 1, true), bucketMat);
    bucket.position.y = 0.5; bucket.castShadow = true; bucketPivot.add(bucket);
    const bucketBottom = new THREE.Mesh(new THREE.CircleGeometry(0.5, 12), new THREE.MeshLambertMaterial({ color: 0x556677 }));
    bucketBottom.rotation.x = -Math.PI / 2; bucketBottom.position.y = 0.01; bucketPivot.add(bucketBottom);
    const rim = new THREE.Mesh(new THREE.TorusGeometry(0.65, 0.04, 6, 16), new THREE.MeshLambertMaterial({ color: 0xaaaaaa }));
    rim.rotation.x = Math.PI / 2; rim.position.y = 1.0; bucketPivot.add(rim);
    const handle = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.03, 6, 12, Math.PI), new THREE.MeshLambertMaterial({ color: 0xaaaaaa }));
    handle.position.y = 1.35; bucketPivot.add(handle);
    const lidGroup = new THREE.Group(); lidGroup.position.y = 1.0;
    lidGroup.add(new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 0.08, 12), new THREE.MeshLambertMaterial({ color: 0x886644 })));
    const knob = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 6), new THREE.MeshLambertMaterial({ color: 0x664422 }));
    knob.position.y = 0.1; lidGroup.add(knob);
    bucketPivot.add(lidGroup);
    hayGroup.add(bucketPivot);

    const carrotsGroup = new THREE.Group(); carrotsGroup.visible = false;
    for (let c = 0; c < 6; c++) {
      const carrot = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.45, 5), new THREE.MeshLambertMaterial({ color: 0xff8c00 }));
      const ca = (c / 6) * Math.PI * 2 + Math.random() * 0.5;
      carrot.position.set(0.8 + Math.cos(ca) * 0.4, 0.1, Math.sin(ca) * 0.5);
      carrot.rotation.x = Math.PI / 2 + (Math.random() - 0.5) * 0.8;
      carrot.rotation.z = Math.random() * Math.PI;
      carrotsGroup.add(carrot);
      const top = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.12, 4), new THREE.MeshLambertMaterial({ color: 0x33aa33 }));
      top.position.copy(carrot.position); top.position.x += 0.15; top.rotation.copy(carrot.rotation);
      carrotsGroup.add(top);
    }
    hayGroup.add(carrotsGroup);

    const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#FFFFFF'; ctx.beginPath(); ctx.arc(64, 64, 50, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222'; ctx.font = 'bold 60px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(answers[i]), 64, 66);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
    sprite.position.set(0, 2.0, 0); sprite.scale.set(1.2, 1.2, 1); hayGroup.add(sprite);
    group.add(hayGroup);

    hayPiles.push({
      localX: hx, answer: answers[i], correct: answersData[i].correct,
      bucketPivot, lidGroup, carrotsGroup, revealed: answersData[i].revealed || false,
    });
  }
  scene.add(group);

  const challenge = { group, position: new THREE.Vector3(cx, challengeY, cz), question, answer: answerVal, hayPiles, active: true, revealed: false };
  challenges.push(challenge);
  return challenge;
}

// ========== START ==========
function showQuestion(challenge) {
  const bar = document.getElementById('question-bar');
  const pd = challenge.problemData;
  if (!pd) { bar.textContent = challenge.question; bar.style.display = 'block'; return; }

  if (pd.useVisual) {
    let html = '<span class="dots">';
    for (let i = 0; i < pd.a; i++) html += `<span class="dot" style="background:${pd.dotColor}"></span>`;
    html += '</span>';
    html += `<span class="op">${pd.type === 'add' ? '+' : '−'}</span>`;
    html += '<span class="dots">';
    for (let i = 0; i < pd.b; i++) html += `<span class="dot" style="background:${pd.dotColor}"></span>`;
    html += '</span>';
    html += '<span class="op">= ?</span>';
    bar.innerHTML = html;
  } else {
    bar.textContent = challenge.question;
  }
  bar.style.display = 'block';
}

function resetGame() {
  sessionStorage.removeItem('horseGameState');
  location.reload();
}

window.startGame = async function () {
  const introEl = document.getElementById('intro');
  const btn = introEl.querySelector('button');
  btn.textContent = 'Loading models...';
  btn.disabled = true;

  // Load all GLB models first
  await loadAllModels((loaded, total) => {
    const pct = Math.round((loaded / total) * 100);
    btn.textContent = `Loading... ${pct}%`;
  });

  introEl.style.display = 'none';

  initScene();
  createHorse();
  initInput();
  initMinimap();

  // Restore state if hot-reloading
  const saved = loadState();
  if (saved) {
    horsePos.set(saved.horseX, saved.horseY, saved.horseZ);
    horseAngle = saved.horseAngle;
    horseSpeed = saved.horseSpeed || 0;
    carrots = saved.carrots;
    applesCollected = saved.applesCollected || 0;
    level = saved.level;
    maxNumber = saved.maxNumber;
    correctAnswers = saved.correctAnswers;
    totalAnswers = saved.totalAnswers;
    runTimer = saved.runTimer || 0;
    walkTime = saved.walkTime || 0;
    updateCarrotHUD();
    document.getElementById('level-display').textContent = `Poziom ${level} (do ${maxNumber})`;
    horseGroup.position.copy(horsePos);
    horseGroup.rotation.y = horseAngle;

    // Unstick horse if spawned inside a collider
    const hr = 0.8;
    for (const c of barnColliders) {
      if (horsePos.x + hr > c.minX && horsePos.x - hr < c.maxX &&
          horsePos.z + hr > c.minZ && horsePos.z - hr < c.maxZ) {
        // Push toward nearest edge
        const pushX = (horsePos.x < (c.minX + c.maxX) / 2) ? c.minX - hr - 0.5 : c.maxX + hr + 0.5;
        horsePos.x = pushX;
      }
    }
    horseGroup.position.copy(horsePos);

    // Snap camera directly behind horse — no lerp animation
    const camX = horsePos.x - Math.sin(horseAngle) * 6;
    const camY = horsePos.y + 4.5;
    const camZ = horsePos.z - Math.cos(horseAngle) * 6;
    camera.position.set(camX, camY, camZ);
    camera.lookAt(horsePos.x + Math.sin(horseAngle) * 2, horsePos.y + 1.0, horsePos.z + Math.cos(horseAngle) * 2);

    // Always generate fresh challenges (old format incompatible)
    for (let i = 0; i < 3; i++) createChallenge();
  } else {
    // Spawn initial challenges
    for (let i = 0; i < 3; i++) createChallenge();
  }

  // Save state periodically
  setInterval(saveState, 500);

  update();
};

// Auto-start if we're hot-reloading
const savedState = loadState();
if (savedState && savedState.gameStarted) {
  window.startGame(); // async, will load models then start
}

// ========== HOT RELOAD (dev) ==========
if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
  const sse = new EventSource('/__reload');
  sse.onmessage = (e) => {
    if (e.data === 'reload') {
      saveState();
      location.reload();
    }
  };
}
